<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>약사로케어 — UI/UX 프로토타입</title>

  <!-- Fonts -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
  <style>
    @font-face { font-family: 'Paperlogy'; font-weight: 100; src: url('../fonts/Paperlogy-1Thin.ttf') format('truetype'); font-display: swap; }
    @font-face { font-family: 'Paperlogy'; font-weight: 200; src: url('../fonts/Paperlogy-2ExtraLight.ttf') format('truetype'); font-display: swap; }
    @font-face { font-family: 'Paperlogy'; font-weight: 300; src: url('../fonts/Paperlogy-3Light.ttf') format('truetype'); font-display: swap; }
    @font-face { font-family: 'Paperlogy'; font-weight: 400; src: url('../fonts/Paperlogy-4Regular.ttf') format('truetype'); font-display: swap; }
    @font-face { font-family: 'Paperlogy'; font-weight: 500; src: url('../fonts/Paperlogy-5Medium.ttf') format('truetype'); font-display: swap; }
    @font-face { font-family: 'Paperlogy'; font-weight: 600; src: url('../fonts/Paperlogy-6SemiBold.ttf') format('truetype'); font-display: swap; }
    @font-face { font-family: 'Paperlogy'; font-weight: 700; src: url('../fonts/Paperlogy-7Bold.ttf') format('truetype'); font-display: swap; }
    @font-face { font-family: 'Paperlogy'; font-weight: 800; src: url('../fonts/PAPERLOGY-8EXTRABOLD.TTF') format('truetype'); font-display: swap; }
    @font-face { font-family: 'Paperlogy'; font-weight: 900; src: url('../fonts/Paperlogy-9Black.ttf') format('truetype'); font-display: swap; }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; }
    body {
      font-family: 'Pretendard Variable', 'Pretendard', -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      background: #1a1a1a;
      overflow: hidden;
    }
    button { font-family: inherit; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    @keyframes yc-spin { to { transform: rotate(360deg); } }
    .yc-spin { animation: yc-spin 0.7s linear infinite; }
    @keyframes yc-fade-in { from { opacity: 0; } to { opacity: 1; } }
    @keyframes yc-pop {
      0% { transform: scale(0.3); opacity: 0; }
      60% { transform: scale(1.08); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }
    @keyframes yc-scan {
      0% { top: 8%; }
      50% { top: 88%; }
      100% { top: 8%; }
    }
    .yc-scanbeam { animation: yc-scan 1.6s ease-in-out infinite; }
    @keyframes yc-slide-fwd { from { opacity: 0; transform: translateX(28px); } to { opacity: 1; transform: none; } }
    @keyframes yc-slide-back { from { opacity: 0; transform: translateX(-28px); } to { opacity: 1; transform: none; } }
    @keyframes yc-fade-screen { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
    .yc-anim-fwd { animation: yc-slide-fwd 320ms cubic-bezier(0.32, 0.72, 0, 1); }
    .yc-anim-back { animation: yc-slide-back 320ms cubic-bezier(0.32, 0.72, 0, 1); }
    .yc-anim-fade { animation: yc-fade-screen 260ms ease; }
    @keyframes yc-check-pop {
      0% { transform: scale(1); }
      40% { transform: scale(1.9); }
      100% { transform: scale(1); }
    }
    .yc-check-pop { animation: yc-check-pop 600ms cubic-bezier(0.34, 1.56, 0.64, 1); }
    @keyframes yc-checked-flash {
      0% { transform: scale(0.92); opacity: 0.4; }
      100% { transform: scale(1); opacity: 1; }
    }
    .yc-checked-flash { animation: yc-checked-flash 360ms ease; display: inline-flex; align-items: center; }
    @keyframes yc-confetti {
      0% { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(560px) rotate(540deg); opacity: 0; }
    }
    .yc-confetti { animation-name: yc-confetti; animation-timing-function: cubic-bezier(0.3, 0.4, 0.6, 1); animation-iteration-count: 1; animation-fill-mode: both; }

    /* Smooth scrolling inside the phone screen */
    .screen-scroll {
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .screen-scroll::-webkit-scrollbar { display: none; }
  </style>

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body style="font-family: &quot;Pretendard Variable&quot;">
  <div id="root"></div>

  <!-- Load components -->
  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" src="android-frame.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="design-tokens.jsx"></script>
  <script type="text/babel" src="screens.jsx"></script>
  <script type="text/babel" src="screens-extra.jsx"></script>
  <script type="text/babel" src="screens-settings-add.jsx"></script>

  <script type="text/babel">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "primaryColor": "#0E6E54",
      "bgColor": "#EFEBE2",
      "headingFont": "Paperlogy",
      "deviceFrame": "Android"
    }/*EDITMODE-END*/;

    function App() {
      const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
      const [screen, setScreen] = React.useState('landing');
      const [history, setHistory] = React.useState(['landing']);
      const [anim, setAnim] = React.useState('fade');

      // Depth ranking — higher = deeper in the flow. Used to pick slide direction.
      const DEPTH = { landing: 0, home: 1, wallet: 1, today: 1, calendar: 1, share: 1, settings: 2, addmed: 2, ocr: 3 };
      const tabScreensList = ['home', 'wallet', 'today', 'calendar', 'share'];

      const navigate = React.useCallback((id) => {
        setScreen(prev => {
          if (id === prev) return prev;
          // Tab-to-tab = crossfade; deeper = slide forward; shallower = slide back
          if (tabScreensList.includes(prev) && tabScreensList.includes(id)) {
            setAnim('fade');
          } else if ((DEPTH[id] ?? 1) >= (DEPTH[prev] ?? 1)) {
            setAnim('fwd');
          } else {
            setAnim('back');
          }
          return id;
        });
        setHistory(prev => [...prev, id]);
      }, []);

      // Tab screens (show tab bar)
      const tabScreens = ['home', 'wallet', 'today', 'calendar', 'share'];
      const showTabBar = tabScreens.includes(screen);

      const renderScreen = () => {
        switch (screen) {
          case 'landing': return <LandingScreen onNavigate={navigate} />;
          case 'home': return <HomeScreen onNavigate={navigate} />;
          case 'wallet': return <WalletScreen onNavigate={navigate} />;
          case 'today': return <TodayScreen onNavigate={navigate} />;
          case 'ocr': return <OcrScreen onNavigate={navigate} />;
          case 'calendar': return <CalendarScreen onNavigate={navigate} />;
          case 'share': return <ShareScreen onNavigate={navigate} />;
          case 'settings': return <SettingsScreen onNavigate={navigate} />;
          case 'addmed': return <AddMedScreen onNavigate={navigate} />;
          default: return <HomeScreen onNavigate={navigate} />;
        }
      };

      // Scale phone to fit viewport
      const phoneScale = 0.75;

      return (
        <div style={{
          width: '100%', height: '100%',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          background: '#1a1a1a',
          padding: 10,
        }}>
          <div style={{
            transform: `scale(${phoneScale})`,
            transformOrigin: 'center center',
            flexShrink: 0,
          }}>
          {t.deviceFrame === 'iPhone' ? (
            <IOSDevice statusBarStyle="dark" homeIndicator width={375} height={812}>
              <div style={{
                position: 'relative', width: '100%', height: '100%',
                background: t.bgColor,
                display: 'flex', flexDirection: 'column',
              }}>
                <div key={screen} className={`screen-scroll yc-anim-${anim}`} style={{ flex: 1, paddingBottom: showTabBar ? 64 : 0 }}>
                  {renderScreen()}
                </div>
                {showTabBar && <TabBar active={screen} onNavigate={navigate} />}
              </div>
            </IOSDevice>
          ) : (
            <AndroidDevice width={380} height={820}>
              <div style={{
                position: 'relative', width: '100%', height: '100%',
                background: t.bgColor,
                display: 'flex', flexDirection: 'column',
              }}>
                <div key={screen} className={`screen-scroll yc-anim-${anim}`} style={{ flex: 1, paddingBottom: showTabBar ? 64 : 0 }}>
                  {renderScreen()}
                </div>
                {showTabBar && <TabBar active={screen} onNavigate={navigate} />}
              </div>
            </AndroidDevice>
          )}
          </div>

          <TweaksPanel>
            <TweakSection label="테마" />
            <TweakColor label="Primary" value={t.primaryColor}
              options={['#0E6E54', '#084B3A', '#2563eb', '#15604E']}
              onChange={v => setTweak('primaryColor', v)} />
            <TweakColor label="배경색" value={t.bgColor}
              options={['#EFEBE2', '#FAFAF5', '#F5F5F0', '#FFFFFF']}
              onChange={v => setTweak('bgColor', v)} />
            <TweakRadio label="디바이스" value={t.deviceFrame}
              options={['iPhone', 'Android']}
              onChange={v => setTweak('deviceFrame', v)} />
            <TweakSection label="화면 이동" />
            <TweakRadio label="화면" value={screen}
              options={['landing', 'home', 'wallet', 'today', 'ocr', 'calendar', 'share', 'settings', 'addmed']}
              onChange={v => navigate(v)} />
          </TweaksPanel>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
